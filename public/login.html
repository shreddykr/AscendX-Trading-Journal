<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AscendX Journal — Sign In</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <style>
        html, body { background-color: #05070b !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #05070b; }
        ::-webkit-scrollbar-thumb { background: #172030; border-radius: 10px; }
        * { scrollbar-width: thin; scrollbar-color: #172030 #05070b; }
    </style>
    <link rel="icon" type="image/png" href="https://r2.fivemanage.com/kLZC8I7nwvbmR93N4rnea/image_5b2174d7.png">
    <meta name="theme-color" content="#05070b">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-logo">ASCEND<span>X</span></div>
            <p class="auth-tagline">Secure Trading Journal</p>

            <!-- Toggle Deck: Sign In / Create Account -->
            <div class="auth-toggle" id="authToggle">
                <button type="button" class="auth-toggle-btn active" data-mode="login">Sign In</button>
                <button type="button" class="auth-toggle-btn" data-mode="register">Create Account</button>
            </div>

            <!-- Shared inline status banner -->
            <div class="auth-banner" id="authBanner"></div>

            <!-- LOGIN + REGISTER FORM -->
            <form id="authForm" class="auth-form" autocomplete="on">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" placeholder="you@email.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="form-group" id="confirmPasswordGroup" style="display:none;">
                    <label>Confirm Password</label>
                    <input type="password" id="authPasswordConfirm" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div class="form-group" id="securityQuestionGroup" style="display:none;">
                    <label>Security Question</label>
                    <select id="securityQuestion"></select>
                </div>
                <div class="form-group" id="securityAnswerGroup" style="display:none;">
                    <label>Answer</label>
                    <input type="text" id="securityAnswer" placeholder="Used to recover your password" autocomplete="off">
                </div>
                <button type="submit" class="auth-submit" id="authSubmit">Sign In</button>
                <div class="auth-links">
                    <a href="javascript:void(0)" id="forgotLink">Forgot password?</a>
                </div>
            </form>

            <!-- FORGOT PASSWORD FORM (security-question recovery, no email) -->
            <form id="forgotForm" class="auth-form" style="display:none;">
                <!-- Step 1: identify the account -->
                <div id="recoverStep1">
                    <p class="auth-help">Enter your account email to look up your security question.</p>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="forgotEmail" placeholder="you@email.com" autocomplete="email">
                    </div>
                    <button type="button" class="auth-submit" id="forgotContinue">Continue</button>
                </div>
                <!-- Step 2: answer the question and set a new password -->
                <div id="recoverStep2" style="display:none;">
                    <p class="auth-help" id="recoverQuestion"></p>
                    <div class="form-group">
                        <label>Your Answer</label>
                        <input type="text" id="recoverAnswer" placeholder="Your answer" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="recoverPassword" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="recoverPasswordConfirm" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <button type="submit" class="auth-submit" id="recoverSubmit">Reset Password</button>
                </div>
                <div class="auth-links">
                    <a href="javascript:void(0)" id="backToLoginLink">← Back to sign in</a>
                </div>
            </form>

            <div class="auth-signature">Made by Shreddykr · AES-256 Encrypted</div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
